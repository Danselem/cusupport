apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml

commonLabels:
  app: livekit-agent
  tier: voice-ai

namespace: livekit

configMapGenerator:
  - name: livekit-agent-config
    envs:
      - config.env

secretGenerator:
  - name: livekit-secrets
    envs:
      - secrets.env
    type: Opaque

apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-agent
  labels:
    app: livekit-agent
    tier: voice-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: livekit-agent
  template:
    metadata:
      labels:
        app: livekit-agent
        tier: voice-ai
    spec:
      containers:
        - name: agent
          image: livekit-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 50931
              protocol: TCP
          env:
            - name: LIVEKIT_URL
              value: "ws://livekit-server:7880"
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: api-key
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: api-secret
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: google-api-key
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: nvidia-api-key
            - name: GOOGLE_LLM_MODEL
              value: "gemini-2.0-flash"
            - name: NVIDIA_TTS_VOICE
              value: "SHASM"
            - name: LOG_LEVEL
              value: "INFO"
            - name: PROMETHEUS_ENABLED
              value: "true"
            - name: PROMETHEUS_PORT
              value: "9090"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /metrics/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      terminationGracePeriodSeconds: 300
